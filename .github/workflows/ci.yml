name: CI/CD Pipeline

on:
  push:
    branches: [ "main" ]

jobs:
  test:
    name: Test Job
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
      - run: test -f index.html

  build:
    name: Build Job
    needs: test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
      - run: echo "Build successful "
